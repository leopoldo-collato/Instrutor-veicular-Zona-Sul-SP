<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Mensagem Enviada | Instrutor Zona Sul SP</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0a192f;
            --secondary: #f37021;
            --success: #25d366;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--primary);
            color: var(--white);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .bg-road-signs {
            background-image: url('https://www.transparenttextures.com/patterns/road-signs.png');
            filter: sepia(1) saturate(5) hue-rotate(340deg) opacity(0.06);
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 90%;
            position: relative;
        }

        .check-icon {
            font-size: 4rem;
            color: var(--success);
            margin-bottom: 20px;
            animation: scaleUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        h1 { font-weight: 900; text-transform: uppercase; margin-bottom: 15px; }
        p { font-weight: 300; opacity: 0.8; line-height: 1.6; margin-bottom: 30px; }

        .btn-home {
            display: inline-block;
            background: var(--secondary);
            color: white;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 8px;
            font-weight: 800;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-home:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(243, 112, 33, 0.3); }

        .countdown {
            margin-top: 25px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
        }

        @keyframes scaleUp {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="bg-road-signs"></div>

    <div class="container">
        <div class="check-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1>Sucesso!</h1>
        <p>Recebemos sua mensagem. Em breve, o instrutor entrará em contato com você via WhatsApp ou e-mail.</p>
        
        <a href="index.html" class="btn-home">Voltar para o Início</a>

        <div class="countdown">
            Você será redirecionado automaticamente em <span id="timer">8</span> segundos.
        </div>
    </div>

    <script>
        // Redirecionamento Automático Seguro
        let seconds = 8;
        const timerElement = document.getElementById('timer');

        const countdown = setInterval(() => {
            seconds--;
            timerElement.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(countdown);
                window.location.href = "index.html"; // Altere para o nome do seu arquivo principal
            }
        }, 1000);
    </script>
</body>
</html>
