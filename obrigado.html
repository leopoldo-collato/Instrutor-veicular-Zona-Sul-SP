<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensagem Enviada | Instrutor Zona Sul SP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0a192f; --secondary: #f37021; --white: #ffffff; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--primary); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        
        /* MENU DE NAVEGAÇÃO COMPACTO */
        nav { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 15px 0; }
        nav ul { display: flex; justify-content: center; list-style: none; gap: 20px; padding: 0; }
        nav ul li a { color: white; text-decoration: none; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; transition: 0.3s; }
        nav ul li a:hover { color: var(--secondary); }

        .content { padding: 20px; max-width: 600px; }
        .icon-check { font-size: 4rem; color: #25d366; margin-bottom: 20px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        p { font-size: 1.1rem; color: #a8b2d1; margin-bottom: 30px; }
        
        .btn-back { background: var(--secondary); color: white; padding: 15px 30px; border-radius: 8px; text-decoration: none; font-weight: 800; text-transform: uppercase; transition: 0.3s; }
        .btn-back:hover { background: white; color: var(--primary); }
    </style>
</head>
<body>

    <nav>
        <ul>
            <li><a href="index.html#inicio">Início</a></li>
            <li><a href="index.html#noticias">Notícias</a></li>
            <li><a href="index.html#imagens">Imagens</a></li>
            <li><a href="index.html#depoimentos">Depoimentos</a></li>
        </ul>
    </nav>

    <div class="content">
        <div class="icon-check"><i class="fas fa-check-circle"></i></div>
        <h1>Obrigado!</h1>
        <p>Sua mensagem foi enviada com sucesso. Em breve o Instrutor entrará em contato com você via WhatsApp ou e-mail.</p>
        <a href="index.html" class="btn-back">Voltar para o Site</a>
    </div>

</body>
</html>
